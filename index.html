<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assets for VTT</title>
    <style>
        body {
            align-items: left;
            justify-content: left;
            margin: 0;
            font-family: sans-serif;
            text-align: left;
            padding: 4px;
        }
        .container { border: 1px solid #ccc; padding: 4px; border-radius: 8px; background: #f9f9f9; }
        input { padding: 8px; width: 70%; margin-bottom: 10px; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        #output { margin-top: 2px; font-weight: bold; color: #2c3e50; white-space: pre-wrap; }
        .error { color: #dc2020; }
    </style>
</head>
<body>
  <p><img width="20px" src="folder.png" alt="Folder Image">Assets for VTT<p>
  <div id="passwordbox" class="container">
    <p>Enter Password to Show Index:</p>
    <input type="password" id="passphrase" placeholder="Password">
    <button onclick="handleDecrypt()">Unlock Index</button>
    <div id="encrypted-data" style="display:none;">
    </div>
  </div>
  <div id="output" class="container"></div>
<script>
    const b64ToUint8 = (b64) => Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    async function decryptData(password, encryptedJson) {
        const { iv, salt, ciphertext } = JSON.parse(encryptedJson);
        const enc = new TextEncoder();
        const keyMaterial = await window.crypto.subtle.importKey(
            "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
        );
        const key = await window.crypto.subtle.deriveKey(
            {
                name: "PBKDF2",
                salt: b64ToUint8(salt),
                iterations: 100000,
                hash: "SHA-256"
            },
            keyMaterial,
            { name: "AES-GCM", length: 256 },
            false,
            ["decrypt"]
        );
        const decrypted = await window.crypto.subtle.decrypt(
            { name: "AES-GCM", iv: b64ToUint8(iv) },
            key,
            b64ToUint8(ciphertext)
        );
        return new TextDecoder().decode(decrypted);
    }
    async function handleDecryptP(pw) {
        const data = document.getElementById('encrypted-data').innerText;
        const out = document.getElementById('output');
        try {
            const secret = await decryptData(pw, data);
            out.innerHTML = secret;
            out.classList.remove('error');
            document.getElementById('passwordbox').style.display = 'none';
        } catch (e) {
            console.error("Error:", e);
            out.innerText = "❌ Incorrect password.";
            out.classList.add('error');
        }
    }
    async function handleDecrypt() {
        return handleDecryptP(document.getElementById('passphrase').value);
    }
    async function loadIndex() {
            try {
                const response = await fetch('index.txt');
                if (!response.ok) {
                    throw new Error('File not found or server error');
                }
                const text = await response.text();
                document.getElementById('encrypted-data').innerText = text;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('output').innerText = 'Failed to load index.txt';
                document.getElementById('passwordbox').style.display = 'none';
            }
     }
     window.onload = loadIndex;
     window.addEventListener("message", (event) => {
           if (event.data.action === "PASSWORD") handleDecryptP(event.data.password);
     });
     document.addEventListener('click', (event) => {
           const link = event.target.closest('a');
           if (link) {
              event.preventDefault();
              const destination = link.getAttribute('href');
              console.log("Navigation blocked! Doing this instead for:", destination);
              window.parent.postMessage({ action: "USEIMAGE", href: destination}, "*");
           }
     });
</script>
</body>
</html>
