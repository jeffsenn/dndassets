<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assets for VTT</title>
    <style>
        body {
            align-items: left;
            justify-content: left;
            margin: 0;
            font-family: sans-serif;
            text-align: left;
            padding: 4px;
        }
        .container { border: 1px solid #ccc; padding: 4px; border-radius: 8px; background: #f9f9f9; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        #output { margin-top: 2px; font-weight: bold; color: #2c3e50; white-space: pre-wrap; }
        .error { color: #dc2020; }
    </style>
</head>
<body>
    <p><img id="folder" width="20px" src="folder.png" alt="Folder Image">Assets for VTT
    <input type="checkbox" id="remember-me">&nbsp;Remember Password
    <p>
  <div id="passwordbox" class="container">
    <p>Enter Password to Show Index:</p>
    <form id="login-form">
    <input type="password" id="password" placeholder="Password" autocomplete="password">
    <button id="login" onclick="handleDecrypt()">Unlock Index</button>
    </form>
    <div id="encrypted-data" style="display:none;">
    </div>
  </div>
  <div id="output" class="container"></div>
  <div id="image-tooltip" style="display: none; position: fixed; pointer-events: none; z-index: 1000;">
    <img id="tooltip-img" src="" style="max-width: 80px; border: 2px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
  </div>  
  <script>
    const STORAGE_KEY = 'vtt_pass';
    const b64ToUint8 = (b64) => Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    async function decryptData(password, encryptedJson) {
        const { iv, salt, ciphertext } = JSON.parse(encryptedJson);
        const enc = new TextEncoder();
        const keyMaterial = await window.crypto.subtle.importKey(
            "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
        );
        const key = await window.crypto.subtle.deriveKey(
            {
                name: "PBKDF2",
                salt: b64ToUint8(salt),
                iterations: 100000,
                hash: "SHA-256"
            },
            keyMaterial,
            { name: "AES-GCM", length: 256 },
            false,
            ["decrypt"]
        );
        const decrypted = await window.crypto.subtle.decrypt(
            { name: "AES-GCM", iv: b64ToUint8(iv) },
            key,
            b64ToUint8(ciphertext)
        );
        return new TextDecoder().decode(decrypted);
    }
    async function handleDecryptP(pw) {
        const data = document.getElementById('encrypted-data').innerText;
        const out = document.getElementById('output');
        const remember = document.getElementById('remember-me').checked;        
        try {
            const secret = await decryptData(pw, data);
            out.innerHTML = '<ul style="white-space:normal;">' + 
                secret.split("\n").map((x) => {
                    const [fn, txt] = x.split(',')
                    return txt ? `<li><a href="images/${fn}">${txt}</a></li>` : ""
                }).join("\n") +
                "</ul>";
            out.classList.remove('error');
            document.getElementById('passwordbox').style.display = 'none';
            if (remember) {
                localStorage.setItem(STORAGE_KEY, pw);
            } else {
                localStorage.removeItem(STORAGE_KEY);                
            }
            setTimeout(addPreview, 2000);
        } catch (e) {
            console.error("Error:", e);
            out.innerText = "❌ Incorrect password.";
            out.classList.add('error');
        }
    }
    async function handleDecrypt() {
        return handleDecryptP(document.getElementById('password').value);
    }
    document.getElementById('remember-me').addEventListener('change', (e) => {
        if (!e.target.checked) {
            localStorage.removeItem(STORAGE_KEY);
        }
    });
    document.getElementById('login-form').addEventListener('submit', function(e) {
        handleDecrypt();
        e.preventDefault();
    });
    //document.getElementById('passwordbox')?.addEventListener('keydown', function(e) { if (e.key === 'Enter') handleDecrypt(); });
    async function loadIndex() {
            try {
                const response = await fetch('index.txt');
                if (!response.ok) {
                    throw new Error('File not found or server error');
                }
                const text = await response.text();
                document.getElementById('encrypted-data').innerText = text;
                
                // Check for saved password
                const savedPw = localStorage.getItem(STORAGE_KEY);
                if (savedPw) {
                    document.getElementById('remember-me').checked = true;
                    document.getElementById('password').value = savedPw;
                    handleDecryptP(savedPw);
                }
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('output').innerText = 'Failed to load encrypted index.txt';
                document.getElementById('passwordbox').style.display = 'none';
            }
     }
     window.onload = loadIndex;
     window.addEventListener("message", (event) => {
         //this sets up the parent event 
         if (event.data.action === "PING") {
             document.addEventListener('click', (event) => {
                 const link = event.target.closest('a');
                 if (link) {
                     event.preventDefault();
                     const destination = link.getAttribute('href');
                     console.log("Navigation blocked! Doing this instead for:", destination);
                     window.parent.postMessage({ action: "USEIMAGE", href: destination}, "*");
                 }
             });
         } else if (event.data.action === "PASSWORD") handleDecryptP(event.data.password);
     });
     function addPreview() {
         const tooltip = document.getElementById('image-tooltip');
         const tooltipImg = document.getElementById('tooltip-img');
         document.querySelectorAll('a').forEach(link => {
             link.addEventListener('mousemove', (e) => {
                 tooltipImg.src = link.href;
                 tooltip.style.display = 'block';
                 tooltip.style.left = (e.clientX + 15) + 'px'; // 15px offset so it doesn't flicker
                 tooltip.style.top = (e.clientY + 15) + 'px';
             });
             link.addEventListener('mouseleave', () => {
                 tooltip.style.display = 'none';
                 tooltipImg.src = ''; 
             });
         });
     };
</script>
</body>
</html>
